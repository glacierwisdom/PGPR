paths:
  processed_data_dir: "data/shs148k_llapa/processed"
  checkpoints_dir: "artifacts/checkpoints/shs148k_llama3b_head_dfs"
  results_dir: "artifacts/metrics/shs148k_llama3b_head_dfs"

dataset:
  name: "shs148k"
  train_file: "data/shs148k_llapa/processed/dfs_train.tsv"
  val_file: "data/shs148k_llapa/processed/dfs_val.tsv"
  test_file: "data/shs148k_llapa/processed/dfs_test.tsv"
  protein_info_file: "protein_info.csv"

training:
  batch_size: 4
  validate: true
  data_loader:
    num_workers: 2
    pin_memory: true

callbacks:
  model_checkpoint: true
  early_stopping: true
  tensorboard_logger: true
  tensorboard:
    comment: "-shs148k-dfs"
  checkpoint:
    dir: "artifacts/checkpoints/shs148k_llama3b_head_dfs"
    monitor: "val_f1_score"
    mode: "max"
    save_best_only: true
    save_freq: 1
    save_weights_only: false
    max_save_files: 3

distributed:
  use_distributed: true
  backend: "nccl"
  world_size: 8
  master_port: 23582

preprocessing:
  similarity_mapping:
    enabled: true
    method: "blastp"
    allow_fallback_to_esm: true
    blastp_evalue: 1e-5
    blastp_num_threads: 16
    batch_size: 16
    cache_dir: "artifacts/cache/protein_similarity_mapper_blastp/shs148k_dfs"
    blastp_timeout_seconds: 60

llm:
  train_llm: true
  output_mode: "relation_head"
  train_backbone: false
  log_inputs: false
  gradient_checkpointing: false
  max_length: 512

reinforcement_learning:
  enabled: false

evaluation:
  batch_size: 32
